<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM Pro PDF Tool - 智慧排序與合併系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --gray: #6c757d;
            --bg: #f4f7f6;
        }

        body { font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #333; }
        
        /* Toolbar */
        .main-toolbar {
            background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: flex; gap: 20px; align-items: center; flex-wrap: wrap; margin-bottom: 20px;
        }
        .file-input-wrapper { display: flex; flex-direction: column; gap: 5px; }
        .export-group { flex-grow: 1; display: flex; align-items: center; gap: 10px; border-left: 1px solid #eee; padding-left: 20px; }
        
        input[type="text"] { padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: 220px; transition: border 0.2s; }
        input[type="text"]:focus { border-color: var(--primary); outline: none; }

        button { 
            padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; 
            font-weight: 600; transition: 0.2s; display: flex; align-items: center; gap: 8px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover:not(:disabled) { background: #0056b3; transform: translateY(-1px); }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        .btn-secondary { background: var(--gray); color: white; }
        .btn-danger { background: var(--danger); color: white; }

        /* Container */
        #thumbnails-container { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; 
            padding: 20px; background: #e9ecef; border-radius: 12px; border: 2px dashed #ced4da; min-height: 400px;
        }

        /* Page Card */
        .page-item { 
            background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); cursor: grab;
            border: 2px solid transparent;
        }
        .page-item:active { cursor: grabbing; }
        .page-item.selected { border-color: var(--primary); background: #f0f7ff; }
        .sortable-ghost { opacity: 0.3; transform: scale(0.9); }

        /* Badge & Icons */
        .new-page-badge {
            position: absolute; top: -12px; left: -12px; width: 32px; height: 32px;
            background: var(--success); color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px; box-shadow: 0 2px 6px rgba(40,167,69,0.4); z-index: 5;
        }
        .btn-delete-page {
            position: absolute; top: -10px; right: -10px; width: 28px; height: 28px;
            background: var(--danger); color: white; border-radius: 50%; border: none;
            cursor: pointer; font-size: 12px; box-shadow: 0 2px 6px rgba(220,53,69,0.3);
        }

        .file-label { font-size: 12px; color: #777; margin-bottom: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        canvas { width: 100%; height: auto; border: 1px solid #eee; border-radius: 4px; background: white; }
        
        .controls-top { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; }
        .controls-bottom { display: flex; justify-content: space-between; gap: 5px; }
        .btn-icon { background: #f1f3f5; padding: 6px; border-radius: 4px; font-size: 14px; flex-grow: 1; }
        .btn-icon:hover { background: #e9ecef; }

        #loading-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center;
            flex-direction: column; font-weight: bold;
        }

        .empty-prompt { grid-column: 1 / -1; text-align: center; color: #adb5bd; padding-top: 150px; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div style="font-size: 2rem;">⏳</div>
    <div id="loading-text">引擎處理中...</div>
</div>

<div class="main-toolbar">
    <div class="file-input-wrapper">
        <label style="font-weight: bold; font-size: 0.9rem;">上傳 PDF 檔案</label>
        <input type="file" id="pdf-upload" accept="application/pdf" multiple disabled>
    </div>

    <div class="export-group">
        <input type="text" id="pdf-filename" value="Merged_Document" placeholder="新 PDF 檔名">
        <button id="btn-export-pdf" class="btn-primary" disabled>🚀 匯出選中頁面</button>
    </div>
    
    <div style="font-size: 12px; color: #888;">💡 綠色圈圈為匯出後的頁碼，拖曳卡片可排序</div>
</div>

<div class="sub-toolbar">
    <button id="btn-select-all" class="btn-secondary">☑️ 全部打勾</button>
    <button id="btn-deselect-all" class="btn-secondary">☐ 取消全選</button>
    <button id="btn-clear-all" class="btn-danger">🗑️ 全部清空</button>
</div>

<div id="thumbnails-container">
    <div class="empty-prompt">尚未載入任何 PDF，請點擊上方按鈕或拖放檔案至此。</div>
</div>

<script>
/**
 * PDF 工程核心 Service
 * 負責處理 PDF 的讀取、儲存引用與匯出邏輯
 */
const PDFEngine = {
    fileRegistry: new Map(), // Map<ID, FileObject>
    CMAP_URL: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',

    async init() {
        const workerUrl = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        pdfjsLib.GlobalWorkerOptions.workerSrc = workerUrl;
    },

    async registerFile(file) {
        const fileId = `f_${crypto.randomUUID()}`;
        this.fileRegistry.set(fileId, file);
        return fileId;
    },

    async getPdfDocument(fileId) {
        const file = this.fileRegistry.get(fileId);
        const buffer = await file.arrayBuffer();
        return await pdfjsLib.getDocument({
            data: new Uint8Array(buffer),
            cMapUrl: this.CMAP_URL,
            cMapPacked: true
        }).promise;
    },

    getFile(fileId) {
        return this.fileRegistry.get(fileId);
    }
};

/**
 * UI 管理器
 * 負責 DOM 操作與事件處理
 */
const AppUI = {
    container: document.getElementById('thumbnails-container'),
    btnExport: document.getElementById('btn-export-pdf'),
    loadingOverlay: document.getElementById('loading-overlay'),

    init() {
        this.initSortable();
        this.bindEvents();
    },

    initSortable() {
        new Sortable(this.container, {
            animation: 250,
            ghostClass: 'sortable-ghost',
            filter: 'button, input',
            preventOnFilter: false,
            onEnd: () => this.refreshPageNumbers()
        });
    },

    bindEvents() {
        document.getElementById('pdf-upload').addEventListener('change', (e) => this.handleFileUpload(e));
        document.getElementById('btn-export-pdf').addEventListener('click', () => this.handleExport());
        document.getElementById('btn-select-all').addEventListener('click', () => this.toggleAll(true));
        document.getElementById('btn-deselect-all').addEventListener('click', () => this.toggleAll(false));
        document.getElementById('btn-clear-all').addEventListener('click', () => this.clearAll());
    },

    async handleFileUpload(e) {
        const files = Array.from(e.target.files);
        if (!files.length) return;

        this.showLoading(true, "正在解析檔案...");
        if (this.container.querySelector('.empty-prompt')) this.container.innerHTML = '';

        for (const file of files) {
            try {
                const fileId = await PDFEngine.registerFile(file);
                const pdf = await PDFEngine.getPdfDocument(fileId);
                const baseName = file.name.replace(/\.[^/.]+$/, "");

                for (let i = 1; i <= pdf.numPages; i++) {
                    await this.renderThumbnail(pdf, i, fileId, baseName);
                }
            } catch (err) {
                console.error("載入錯誤:", err);
                alert(`檔案解析失敗: ${file.name}，可能是受保護的 PDF。`);
            }
        }

        this.refreshPageNumbers();
        this.showLoading(false);
        e.target.value = '';
    },

    async renderThumbnail(pdf, pageNum, fileId, fileName) {
        const page = await pdf.getPage(pageNum);
        const viewport = page.getViewport({ scale: 0.6 }); // 縮圖解析度優化

        const card = document.createElement('div');
        card.className = 'page-item selected';
        card.dataset.fileId = fileId;
        card.dataset.originIdx = pageNum - 1;

        card.innerHTML = `
            <div class="new-page-badge">-</div>
            <button class="btn-delete-page">✕</button>
            <div class="file-label">${fileName}.pdf</div>
            <canvas></canvas>
            <div class="controls-top">
                <input type="checkbox" class="page-checkbox" checked>
                <span style="font-size:12px; color:#999;">原始 P.${pageNum}</span>
            </div>
            <div class="controls-bottom">
                <button class="btn-icon btn-move-prev">⬅️</button>
                <button class="btn-icon btn-save-img" title="另存為圖片">💾</button>
                <button class="btn-icon btn-move-next">➡️</button>
            </div>
        `;

        const canvas = card.querySelector('canvas');
        const context = canvas.getContext('2d', { alpha: false }); // 效能優化
        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({ canvasContext: context, viewport }).promise;

        // 綁定卡片內事件
        card.querySelector('.btn-delete-page').onclick = () => { card.remove(); this.refreshPageNumbers(); };
        card.querySelector('.page-checkbox').onchange = () => {
            card.classList.toggle('selected', card.querySelector('.page-checkbox').checked);
            this.refreshPageNumbers();
        };
        card.querySelector('.btn-move-prev').onclick = () => {
            const prev = card.previousElementSibling;
            if (prev) this.container.insertBefore(card, prev);
            this.refreshPageNumbers();
        };
        card.querySelector('.btn-move-next').onclick = () => {
            const next = card.nextElementSibling;
            if (next) this.container.insertBefore(next, card);
            this.refreshPageNumbers();
        };
        card.querySelector('.btn-save-img').onclick = () => this.downloadCanvasAsImage(canvas, fileName, pageNum);

        this.container.appendChild(card);
    },

    refreshPageNumbers() {
        const items = this.container.querySelectorAll('.page-item');
        let counter = 1;
        items.forEach(item => {
            const badge = item.querySelector('.new-page-badge');
            const isChecked = item.querySelector('.page-checkbox').checked;
            if (isChecked) {
                badge.innerText = counter++;
                badge.style.background = 'var(--success)';
            } else {
                badge.innerText = '-';
                badge.style.background = 'var(--gray)';
            }
        });
        this.btnExport.disabled = (counter === 1);
        if (items.length === 0) this.container.innerHTML = '<div class="empty-prompt">尚未載入任何 PDF，請點擊上方按鈕或拖放檔案至此。</div>';
    },

    async handleExport() {
        const selectedCards = Array.from(this.container.querySelectorAll('.page-item'))
                                    .filter(el => el.querySelector('.page-checkbox').checked);
        
        if (!selectedCards.length) return;

        this.showLoading(true, "正在合併並封裝 PDF...");

        try {
            const newPdf = await PDFLib.PDFDocument.create();
            const sourceDocCache = new Map(); // 用於單次匯出的緩存

            for (const card of selectedCards) {
                const fid = card.dataset.fileId;
                const idx = parseInt(card.dataset.originIdx);

                if (!sourceDocCache.has(fid)) {
                    // 核心點：每次匯出時才從 File 物件重新載入 fresh buffer
                    const file = PDFEngine.getFile(fid);
                    const freshBuffer = await file.arrayBuffer();
                    sourceDocCache.set(fid, await PDFLib.PDFDocument.load(freshBuffer));
                }

                const srcDoc = sourceDocCache.get(fid);
                const [copiedPage] = await newPdf.copyPages(srcDoc, [idx]);
                newPdf.addPage(copiedPage);
            }

            const pdfBytes = await newPdf.save();
            let fileName = document.getElementById('pdf-filename').value.trim() || 'Export';
            if (!fileName.toLowerCase().endsWith('.pdf')) fileName += '.pdf';

            this.triggerDownload(new Blob([pdfBytes], { type: 'application/pdf' }), fileName);
        } catch (err) {
            console.error("匯出失敗:", err);
            alert("匯出 PDF 時發生錯誤，請檢查檔案是否含有權限限制。");
        } finally {
            this.showLoading(false);
        }
    },

    downloadCanvasAsImage(canvas, baseName, pNum) {
        canvas.toBlob(blob => {
            this.triggerDownload(blob, `${baseName}_p${pNum}.png`);
        }, 'image/png');
    },

    triggerDownload(blob, name) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    },

    toggleAll(state) {
        this.container.querySelectorAll('.page-checkbox').forEach(cb => {
            cb.checked = state;
            cb.closest('.page-item').classList.toggle('selected', state);
        });
        this.refreshPageNumbers();
    },

    clearAll() {
        if (confirm("確定清空目前所有進度嗎？")) {
            this.container.innerHTML = '';
            PDFEngine.fileRegistry.clear();
            this.refreshPageNumbers();
        }
    },

    showLoading(show, text = "") {
        document.getElementById('loading-text').innerText = text;
        this.loadingOverlay.style.display = show ? 'flex' : 'none';
    }
};

// 系統初始化
(async () => {
    try {
        await PDFEngine.init();
        AppUI.init();
        document.getElementById('pdf-upload').disabled = false;
    } catch (e) {
        console.error("系統啟動失敗:", e);
    }
})();
</script>

</body>
</html>
