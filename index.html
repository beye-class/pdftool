<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM PDF Pro - 專業級多檔案合併與編輯器</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --dark: #343a40;
            --light: #f8f9fa;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        body { font-family: "Inter", -apple-system, sans-serif; background-color: #eef1f4; margin: 0; padding: 20px; color: #333; }

        /* 頂部控制面板 */
        .dashboard {
            background: #fff; padding: 25px; border-radius: 16px; box-shadow: var(--shadow);
            margin-bottom: 25px; display: flex; flex-direction: column; gap: 20px;
        }

        .upload-section {
            border: 2px dashed #cbd5e0; background: #fdfdfd; padding: 40px; border-radius: 12px;
            text-align: center; cursor: pointer; transition: all 0.3s ease;
        }
        .upload-section:hover, .upload-section.dragover { border-color: var(--primary); background: #f0f7ff; }
        .upload-section h3 { margin: 0; color: var(--primary); font-size: 1.4rem; }
        .upload-section p { color: #718096; margin: 8px 0 0; }

        .action-bar { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .export-control { display: flex; align-items: center; gap: 10px; background: #f1f3f5; padding: 10px 15px; border-radius: 8px; }
        
        /* 表單與按鈕 */
        input[type="text"] { padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: 240px; outline: none; }
        input[type="text"]:focus { border-color: var(--primary); }
        
        button { 
            padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; 
            font-weight: 600; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover:not(:disabled) { background: #0056b3; transform: translateY(-1px); }
        .btn-primary:disabled { background: #cbd5e0; cursor: not-allowed; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: transparent; border: 1px solid #ddd; color: #555; }
        .btn-outline:hover { background: #f8f9fa; }

        /* 縮圖區域 */
        #thumbnails-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; 
            min-height: 400px; padding: 10px;
        }

        .page-card { 
            background: #fff; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            position: relative; transition: transform 0.2s, box-shadow 0.2s; border: 2px solid transparent;
            cursor: grab;
        }
        .page-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
        .page-card.selected { border-color: var(--primary); background: #f0f7ff; }
        .sortable-ghost { opacity: 0.2; transform: scale(0.8); }

        /* 卡片裝飾 */
        .page-badge {
            position: absolute; top: -12px; left: -12px; width: 34px; height: 34px;
            background: var(--success); color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px; box-shadow: 0 2px 6px rgba(40,167,69,0.3); z-index: 5;
        }
        .btn-card-del {
            position: absolute; top: -10px; right: -10px; width: 28px; height: 28px;
            background: var(--danger); color: white; border: none; border-radius: 50%;
            cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 5;
        }

        canvas { width: 100%; height: auto; border: 1px solid #eee; border-radius: 6px; background: #fff; margin: 10px 0; }
        .card-meta { font-size: 12px; color: #718096; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 5px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }

        /* 載入遮罩 */
        #loader { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 9999; justify-content: center; align-items: center;
            flex-direction: column; font-weight: bold; font-size: 1.2rem;
        }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .empty-state { grid-column: 1 / -1; text-align: center; padding-top: 100px; color: #a0aec0; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="loader-text">處理中...</div>
</div>

<div class="dashboard">
    <div class="upload-section" id="drop-zone">
        <h3>📄 點擊或拖放多個 PDF 檔案至此</h3>
        <p>支援分批次上傳，頁面會自動累加</p>
        <input type="file" id="file-input" accept="application/pdf" multiple style="display: none;">
    </div>

    <div class="action-bar">
        <div class="export-control">
            <label style="font-size: 0.9rem; font-weight: 600;">匯出檔名：</label>
            <input type="text" id="out-filename" value="Merged_Document">
            <button id="btn-export" class="btn-primary" disabled>🚀 合併並匯出 PDF</button>
        </div>

        <div style="flex-grow: 1;"></div>

        <button id="btn-sel-all" class="btn-outline">☑️ 全選</button>
        <button id="btn-desel-all" class="btn-outline">☐ 取消</button>
        <button id="btn-clear" class="btn-danger">🗑️ 清空工作區</button>
    </div>
</div>

<div id="thumbnails-grid">
    <div class="empty-state">
        <div style="font-size: 3rem; margin-bottom: 10px;">📂</div>
        請上傳 PDF 開始編輯
    </div>
</div>

<script>
/**
 * 核心引擎 (PDF Engine)
 * 負責 File 註冊與 pdf-lib / pdf.js 的橋接
 */
const PDFEngine = {
    registry: new Map(), // 儲存 ID -> File 物件，確保記憶體引用不丟失
    
    async init() {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    },

    async addFiles(files) {
        const results = [];
        for (const file of files) {
            if (file.type !== 'application/pdf') continue;
            const id = `file_${crypto.randomUUID()}`;
            this.registry.set(id, file);
            results.push({ id, file });
        }
        return results;
    },

    async getFreshDoc(id) {
        const file = this.registry.get(id);
        const buffer = await file.arrayBuffer();
        return await PDFLib.PDFDocument.load(buffer);
    },

    clear() {
        this.registry.clear();
    }
};

/**
 * UI 管理器 (App Controller)
 */
const App = {
    grid: document.getElementById('thumbnails-grid'),
    btnExport: document.getElementById('btn-export'),
    loader: document.getElementById('loader'),

    init() {
        PDFEngine.init();
        this.setupEventListeners();
        this.setupSortable();
    },

    setupEventListeners() {
        const zone = document.getElementById('drop-zone');
        const input = document.getElementById('file-input');

        zone.onclick = () => input.click();
        zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('dragover'); };
        zone.ondragleave = () => zone.classList.remove('dragover');
        zone.ondrop = (e) => {
            e.preventDefault();
            zone.classList.remove('dragover');
            this.handleUpload(e.dataTransfer.files);
        };

        input.onchange = (e) => this.handleUpload(e.target.files);
        
        document.getElementById('btn-export').onclick = () => this.runExport();
        document.getElementById('btn-sel-all').onclick = () => this.toggleAll(true);
        document.getElementById('btn-desel-all').onclick = () => this.toggleAll(false);
        document.getElementById('btn-clear').onclick = () => this.clearAll();
    },

    setupSortable() {
        new Sortable(this.grid, {
            animation: 200,
            ghostClass: 'sortable-ghost',
            filter: '.empty-state, button, input',
            onEnd: () => this.syncPageNumbers()
        });
    },

    async handleUpload(files) {
        if (!files.length) return;
        this.setLoading(true, "解析 PDF 中...");

        if (this.grid.querySelector('.empty-state')) this.grid.innerHTML = '';

        const newFiles = await PDFEngine.addFiles(files);
        
        for (const item of newFiles) {
            try {
                const buffer = await item.file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({
                    data: new Uint8Array(buffer),
                    cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',
                    cMapPacked: true
                }).promise;

                for (let i = 1; i <= pdf.numPages; i++) {
                    await this.renderCard(pdf, i, item.id, item.file.name);
                }
            } catch (err) {
                console.error("解析失敗:", err);
            }
        }

        this.syncPageNumbers();
        this.setLoading(false);
    },

    async renderCard(pdf, pageNum, fileId, fileName) {
        const page = await pdf.getPage(pageNum);
        const viewport = page.getViewport({ scale: 0.6 });
        
        const card = document.createElement('div');
        card.className = 'page-card selected';
        card.dataset.fid = fileId;
        card.dataset.pidx = pageNum - 1;
        card.innerHTML = `
            <div class="page-badge">-</div>
            <button class="btn-card-del">✕</button>
            <div class="card-meta">${fileName}</div>
            <canvas></canvas>
            <div class="card-footer">
                <label style="cursor:pointer; font-size:13px;">
                    <input type="checkbox" class="page-cb" checked> 勾選匯出
                </label>
                <span style="color:#aaa; font-size:12px;">P.${pageNum}</span>
            </div>
        `;

        const canvas = card.querySelector('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

        // 卡片事件
        card.querySelector('.btn-card-del').onclick = (e) => {
            e.stopPropagation();
            card.remove();
            this.syncPageNumbers();
        };
        card.querySelector('.page-cb').onchange = () => {
            card.classList.toggle('selected', card.querySelector('.page-cb').checked);
            this.syncPageNumbers();
        };

        this.grid.appendChild(card);
    },

    syncPageNumbers() {
        const cards = Array.from(this.grid.querySelectorAll('.page-card'));
        let count = 1;
        cards.forEach(card => {
            const cb = card.querySelector('.page-cb');
            const badge = card.querySelector('.page-badge');
            if (cb.checked) {
                badge.innerText = count++;
                badge.style.background = 'var(--success)';
            } else {
                badge.innerText = '-';
                badge.style.background = '#cbd5e0';
            }
        });
        this.btnExport.disabled = count === 1;
        if (cards.length === 0) {
            this.grid.innerHTML = '<div class="empty-state">請上傳 PDF 開始編輯</div>';
        }
    },

    async runExport() {
        const selectedCards = Array.from(this.grid.querySelectorAll('.page-card'))
                                   .filter(c => c.querySelector('.page-cb').checked);
        if (!selectedCards.length) return;

        this.setLoading(true, "合併並生成 PDF 中...");
        
        try {
            const newPdf = await PDFLib.PDFDocument.create();
            const docCache = new Map();

            for (const card of selectedCards) {
                const fid = card.dataset.fid;
                const pIdx = parseInt(card.dataset.pidx);

                if (!docCache.has(fid)) {
                    docCache.set(fid, await PDFEngine.getFreshDoc(fid));
                }

                const srcDoc = docCache.get(fid);
                const [copiedPage] = await newPdf.copyPages(srcDoc, [pIdx]);
                newPdf.addPage(copiedPage);
            }

            const bytes = await newPdf.save();
            this.download(bytes, "application/pdf");
        } catch (err) {
            console.error(err);
            alert("匯出失敗，請檢查檔案是否含有限制。");
        }
        this.setLoading(false);
    },

    download(data, type) {
        const blob = new Blob([data], { type });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        let name = document.getElementById('out-filename').value.trim() || 'Merged';
        if (!name.toLowerCase().endsWith('.pdf')) name += '.pdf';
        
        a.href = url;
        a.download = name;
        a.click();
        URL.revokeObjectURL(url);
    },

    toggleAll(state) {
        this.grid.querySelectorAll('.page-cb').forEach(cb => {
            cb.checked = state;
            cb.closest('.page-card').classList.toggle('selected', state);
        });
        this.syncPageNumbers();
    },

    clearAll() {
        if (confirm("確定清空所有檔案與進度？")) {
            this.grid.innerHTML = '';
            PDFEngine.clear();
            this.syncPageNumbers();
        }
    },

    setLoading(show, text) {
        document.getElementById('loader-text').innerText = text;
        this.loader.style.display = show ? 'flex' : 'none';
    }
};

App.init();
</script>

</body>
</html>
